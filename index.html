<!DOCTYPE html>
<html lang="en">
<head>
    <title>OBIA Land Cover Classification</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css" />
    <script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; } 
        #sidebar { width: 320px; height: 100vh; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100vh; }
        h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        .info-box { background: #34495e; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em; }
        .legend-item { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .color-picker { border: none; width: 30px; height: 30px; padding: 0; cursor: pointer; border-radius: 3px; }
        .btn-toggle { width: 100%; padding: 8px; margin-top: 10px; background: #3498db; border: none; color: white; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-toggle:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>🗺️ Map Information</h2>
        <div class="info-box">
            <b>Title:</b> OBIA Land Cover Classification<br><br>
            <b>Author:</b> Researcher Pham Dang Hien<br>
            <b>Contact:</b> contact@example.com<br><br>
            <i>Interactive OBIA Classification Result. Click on polygons to view metadata.</i>
        </div>
        
        <h2>🎨 Layer Styling</h2>
        <div id="style-controls"></div>
        
        <h2>⚙️ Map Controls</h2>
        <button class="btn-toggle" onclick="toggleGraticule()">Toggle Grid (Graticule)</button>
        <button class="btn-toggle" onclick="toggleLayer()">Turn Layer On/Off</button>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([0, 0], 2);
        
        // Basemaps (Fixed Esri URL)
        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 });
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 });
        var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' });
        
        satellite.addTo(map); // Default
        L.control.layers({ "Satellite": satellite, "OSM Streets": osm, "Dark Canvas": dark }).addTo(map);

        // Tools
        L.Control.geocoder().addTo(map);
        L.control.measure({ primaryLengthUnit: 'meters', secondaryAreaUnit: 'hectares' }).addTo(map);

        // Simple Custom Graticule (Lưới tọa độ)
        var graticuleLayer = L.layerGroup();
        for (var lat = -90; lat <= 90; lat += 10) { L.polyline([[lat, -180], [lat, 180]], {color: '#fff', weight: 1, opacity: 0.3, dashArray: '5, 5'}).addTo(graticuleLayer); }
        for (var lng = -180; lng <= 180; lng += 10) { L.polyline([[-90, lng], [90, lng]], {color: '#fff', weight: 1, opacity: 0.3, dashArray: '5, 5'}).addTo(graticuleLayer); }
        
        function toggleGraticule() {
            if (map.hasLayer(graticuleLayer)) map.removeLayer(graticuleLayer);
            else map.addLayer(graticuleLayer);
        }

        // Data & Styling
        var colorMap = {"water1987": "#4CAF50", "Baren1987": "#2196F3", "Ruong1987": "#F44336", "Forest1987": "#FF9800", "Lake1987": "#9C27B0", "City1987": "#795548", "Agriculture1987": "#00BCD4"};
        var fldName = "Class";
        var geojsonLayer;
        var layerVisible = true;

        function styleFeature(feature) {
            var cVal = fldName ? feature.properties[fldName] : "Default";
            return { color: "#ffffff", weight: 1, fillColor: colorMap[cVal] || "#3388ff", fillOpacity: 0.7 };
        }

        fetch('data.geojson').then(res => res.json()).then(data => {
            geojsonLayer = L.geoJSON(data, {
                style: styleFeature,
                onEachFeature: function (feature, layer) {
                    layer.on({
                        mouseover: function(e) { e.target.setStyle({ weight: 3, color: '#ffeb3b', fillOpacity: 0.9 }); e.target.bringToFront(); },
                        mouseout: function(e) { geojsonLayer.resetStyle(e.target); }
                    });
                    
                    if (feature.properties) {
                        var popup = "<h3>Feature Details</h3><table style='width:100%; border-collapse: collapse;' border='1'>";
                        for (var p in feature.properties) {
                            popup += "<tr><td style='padding:4px;'><b>" + p + "</b></td><td style='padding:4px;'>" + feature.properties[p] + "</td></tr>";
                        }
                        layer.bindPopup(popup + "</table>");
                    }
                }
            }).addTo(map);
            map.fitBounds(geojsonLayer.getBounds());
            buildColorPickers();
        });

        function toggleLayer() {
            if (layerVisible) map.removeLayer(geojsonLayer);
            else map.addLayer(geojsonLayer);
            layerVisible = !layerVisible;
        }

        function buildColorPickers() {
            var container = document.getElementById('style-controls');
            for (var key in colorMap) {
                var div = document.createElement('div');
                div.className = 'legend-item';
                div.innerHTML = "<span>" + key + "</span>";
                
                var input = document.createElement('input');
                input.type = 'color';
                input.className = 'color-picker';
                input.value = colorMap[key];
                input.setAttribute('data-class', key);
                
                input.addEventListener('change', function(e) {
                    var targetClass = e.target.getAttribute('data-class');
                    colorMap[targetClass] = e.target.value;
                    geojsonLayer.setStyle(styleFeature);
                });
                
                div.appendChild(input);
                container.appendChild(div);
            }
        }
    </script>
</body>
</html>
