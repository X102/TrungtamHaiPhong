<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic WebGIS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css" />
    <script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; } 
        #sidebar { width: 320px; height: 100vh; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; height: 100vh; }
        h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        .info-box { background: #34495e; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em; }
        .layer-ctrl { margin-bottom: 8px; }
        .color-picker { border: none; width: 25px; height: 25px; padding: 0; cursor: pointer; border-radius: 3px; vertical-align: middle; }
    </style>
    <script src="config.js"></script> </head>
<body>
    <div id="sidebar">
        <h2>🗺️ Map Information</h2>
        <div class="info-box">
            <b id="w-title"></b><br><br>
            <b>Author:</b> <span id="w-author"></span><br>
            <b>Contact:</b> <span id="w-contact"></span>
        </div>
        
        <h2>📂 Data Layers</h2>
        <div id="layer-controls"></div>
        
        <h2>🎨 Class Styling</h2>
        <div id="style-controls"></div>
    </div>
    <div id="map"></div>

    <script>
        document.title = mapConfig.title;
        document.getElementById('w-title').innerText = mapConfig.title;
        document.getElementById('w-author').innerText = mapConfig.author;
        document.getElementById('w-contact').innerText = mapConfig.contact;

        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 }).addTo(map);
        L.control.measure({ primaryLengthUnit: 'meters', secondaryAreaUnit: 'hectares' }).addTo(map);

        var loadedLayers = {};
        
        function styleFeature(feature, fldName) {
            var cVal = fldName ? feature.properties[fldName] : null;
            return { color: "#ffffff", weight: 1, fillColor: mapConfig.colors[cVal] || "#3388ff", fillOpacity: 0.7 };
        }

        // Đọc động từng Layer
        var bounds = L.latLngBounds();
        mapConfig.layers.forEach((cfg, idx) => {
            fetch(cfg.file).then(res => res.json()).then(data => {
                var layer = L.geoJSON(data, {
                    style: function(f) { return styleFeature(f, cfg.field); },
                    onEachFeature: function (feature, l) {
                        l.on({
                            mouseover: function(e) { e.target.setStyle({ weight: 3, color: '#ffeb3b', fillOpacity: 0.9 }); e.target.bringToFront(); },
                            mouseout: function(e) { layer.resetStyle(e.target); }
                        });
                        if (feature.properties) {
                            var popup = "<table border='1' style='border-collapse: collapse; width: 100%;'>";
                            for (var p in feature.properties) { popup += "<tr><td style='padding:4px;'><b>" + p + "</b></td><td style='padding:4px;'>" + feature.properties[p] + "</td></tr>"; }
                            l.bindPopup(popup + "</table>");
                        }
                    }
                }).addTo(map);
                
                loadedLayers[cfg.name] = { layer: layer, field: cfg.field };
                bounds.extend(layer.getBounds());
                map.fitBounds(bounds);
                
                // Add Checkbox Toggle
                var ctrlDiv = document.createElement('div');
                ctrlDiv.className = 'layer-ctrl';
                ctrlDiv.innerHTML = `<input type='checkbox' checked onchange='toggleLayer("${cfg.name}", this.checked)'> ${cfg.name}`;
                document.getElementById('layer-controls').appendChild(ctrlDiv);
            });
        });

        function toggleLayer(name, isVisible) {
            if(isVisible) map.addLayer(loadedLayers[name].layer);
            else map.removeLayer(loadedLayers[name].layer);
        }

        // Build Color Pickers
        var styleContainer = document.getElementById('style-controls');
        for (var key in mapConfig.colors) {
            var div = document.createElement('div'); div.className = 'layer-ctrl';
            div.innerHTML = `<input type='color' class='color-picker' value='${mapConfig.colors[key]}' data-class='${key}'> <span>${key}</span>`;
            styleContainer.appendChild(div);
        }
        
        document.querySelectorAll('.color-picker').forEach(item => {
            item.addEventListener('change', event => {
                var targetClass = event.target.getAttribute('data-class');
                mapConfig.colors[targetClass] = event.target.value;
                for (var name in loadedLayers) {
                    loadedLayers[name].layer.setStyle(function(f) { return styleFeature(f, loadedLayers[name].field); });
                }
            });
        });
    </script>
</body>
</html>
