<!DOCTYPE html>
<html lang="en">
<head>
    <title>Professional WebGIS Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css" />
    <script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side/leaflet-side-by-side.min.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-pip@latest/leaflet-pip.js"></script>
    <script src="config.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1e1e1e; }
        #map { flex-grow: 1; height: 100%; transition: width 0.3s; z-index: 1; }
        
        /* Đã tối ưu Sidebar cho Mobile, có nút thu gọn */
        #sidebar { width: 350px; background: #2c3e50; color: #ecf0f1; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .sidebar-header { padding: 15px; background: #1a252f; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { padding: 15px; overflow-y: auto; flex-grow: 1; }
        #toggle-btn { display: none; position: absolute; top: 15px; left: 15px; z-index: 2000; background: #3498db; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
        
        .section-title { font-size: 1.1em; border-bottom: 2px solid #34495e; padding-bottom: 5px; margin: 20px 0 10px 0; font-weight: 500; color: #3498db; }
        .info-card { background: #34495e; padding: 15px; border-radius: 8px; font-size: 0.9em; line-height: 1.5; }
        
        .layer-group { background: #34495e; margin-bottom: 10px; border-radius: 6px; overflow: hidden; }
        .layer-title { background: #2c3e50; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a252f; }
        .class-item { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; border-bottom: 1px solid #2c3e50; }
        .class-item:last-child { border-bottom: none; }
        
        .color-btn { width: 20px; height: 20px; border: 2px solid #ecf0f1; border-radius: 50%; cursor: pointer; padding: 0; }
        .stat-badge { background: #1abc9c; color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.8em; margin-left: 5px; }
        
        .control-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn-action { flex: 1; background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-right: 5px; transition: 0.2s; }
        .btn-action:hover { background: #2980b9; }
        .btn-action:last-child { margin-right: 0; }
        
        /* Tooltip Tùy chỉnh */
        .custom-tooltip { background: rgba(0,0,0,0.8); color: white; border: none; border-radius: 4px; font-family: 'Roboto'; font-size: 13px; }
        .leaflet-tooltip-left::before { border-left-color: rgba(0,0,0,0.8); }
        .leaflet-tooltip-right::before { border-right-color: rgba(0,0,0,0.8); }
        
        /* Popup Trong Suốt Mờ */
        .leaflet-popup-content-wrapper { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px); 
            box-shadow: 0 3px 14px rgba(0,0,0,0.4); 
        }
        .leaflet-popup-tip { background: rgba(255, 255, 255, 0.9); }

        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #toggle-btn { display: block; }
        }
    </style>
</head>
<body>
    <button id="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3 style="margin: 0;" id="w-title">WebGIS Dashboard</h3>
            <button onclick="toggleSidebar()" style="background:none;border:none;color:white;font-size:1.2em;cursor:pointer;" class="close-mobile"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="sidebar-content">
            <div class="info-card">
                <b>Author:</b> <span id="w-author"></span><br>
                <b>Contact:</b> <span id="w-contact"></span><br><hr style="border-color:#2c3e50">
                <i>Interactive GIS Dashboard. Hover over features for details. Use color pickers to customize styling.</i>
            </div>

            <div class="section-title"><i class="fas fa-layer-group"></i> Tools & Views</div>
            <div class="control-row">
                <button class="btn-action" onclick="toggleAllLayers(true)">Show All</button>
                <button class="btn-action" onclick="toggleAllLayers(false)">Hide All</button>
                <button class="btn-action" onclick="map.fitBounds(globalBounds)" style="background:#e67e22;">Zoom All</button>
            </div>
            <div class="control-row">
                <button class="btn-action" onclick="enableSwipe()" style="background:#9b59b6;"><i class="fas fa-columns"></i> Swipe Mode</button>
            </div>

            <div class="section-title"><i class="fas fa-list"></i> Layer Management</div>
            <div id="layer-container"></div>
        </div>
    </div>
    
    <div id="map"></div>

    <script>
        // Init Config
        document.title = mapConfig.title;
        document.getElementById('w-title').innerText = mapConfig.title;
        document.getElementById('w-author').innerText = mapConfig.author;
        document.getElementById('w-contact').innerText = mapConfig.contact;

        function toggleSidebar() {
            var sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
        }

        // --- BẢN ĐỒ TOÀN CẦU ---
        var map = L.map('map', { worldCopyJump: true }).setView([20, 105], 5);
        
        // Fix lỗi trắng nền khi zoom out bằng cách dùng Tile chuẩn của Google hoặc Esri World
        var satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 19, attribution: '© Esri', noWrap: false 
        }).addTo(map);
        
        var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            maxZoom: 19, attribution: '© OSM' 
        });

        var darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19, attribution: '© CartoDB'
        });

        L.control.layers({ "Satellite (Esri)": satLayer, "Streets (OSM)": streetLayer, "Dark Mode": darkLayer }).addTo(map);
        L.control.measure({ primaryLengthUnit: 'meters', secondaryAreaUnit: 'hectares' }).addTo(map);

        var loadedLayers = {};
        var globalBounds = L.latLngBounds();
        var swipeControl = null;
        var layerGroupCollection = L.featureGroup().addTo(map); // Chứa toàn bộ layer để dùng leaflet-pip

        // Vô hiệu hóa Popup mặc định của L.geoJSON
        var layerPromises = mapConfig.layers.map((cfg, idx) => {
            return fetch(cfg.file).then(res => res.json()).then(data => {
                var stats = calculateStats(data, cfg.field);
                
                var geoLayer = L.geoJSON(data, {
                    style: function(f) { return styleFeature(f, cfg.field); },
                    // KHÔNG dùng onEachFeature để bindPopup nữa, chỉ dùng tooltip
                    onEachFeature: function (feature, layer) {
                        var cVal = cfg.field ? feature.properties[cfg.field] : "Polygon";
                        layer.bindTooltip(`<b>${cVal}</b>`, { className: 'custom-tooltip', sticky: true });
                        
                        layer.on({
                            mouseover: function(e) { e.target.setStyle({ weight: 3, color: '#f39c12', fillOpacity: 0.9 }); },
                            mouseout: function(e) { geoLayer.resetStyle(e.target); }
                        });
                        
                        // Lưu thông tin gốc vào layer để truy xuất
                        layer._sourceLayerName = cfg.name;
                    }
                });
                
                layerGroupCollection.addLayer(geoLayer);
                loadedLayers[cfg.name] = { layer: geoLayer, cfg: cfg, stats: stats };
                globalBounds.extend(geoLayer.getBounds());
                buildLayerUI(cfg.name);
            });
        });

        Promise.all(layerPromises).then(() => { map.fitBounds(globalBounds); });

        // TÍNH NĂNG POPUP XUYÊN NHIỀU LAYER (Point in Polygon)
        map.on('click', function(e) {
            // Lấy tất cả polygon chứa điểm click
            var results = leafletPip.pointInLayer(e.latlng, layerGroupCollection);
            
            if (results.length > 0) {
                var html = "<div style='max-height: 250px; overflow-y: auto;'>";
                html += "<h4 style='margin-top:0; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>Layer Info (" + results.length + ")</h4>";
                
                // Lặp qua các kết quả (từ trên xuống dưới)
                results.forEach(res => {
                    var layerName = res._sourceLayerName || "Unknown Layer";
                    html += `<b style='color:#2c3e50;'>${layerName}</b>`;
                    html += "<table style='width: 100%; border-collapse: collapse; margin-bottom: 10px;' border='1'>";
                    for (var p in res.feature.properties) { 
                        html += `<tr><td style='padding:4px; font-size:12px;'><b>${p}</b></td><td style='padding:4px; font-size:12px;'>${res.feature.properties[p]}</td></tr>`; 
                    }
                    html += "</table>";
                });
                html += "</div>";
                
                L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
            }
        });

        function toggleSingleLayer(name, isVisible) {
            if (isVisible) layerGroupCollection.addLayer(loadedLayers[name].layer);
            else layerGroupCollection.removeLayer(loadedLayers[name].layer);
        }

        // CHẾ ĐỘ SWIPE (BẬT / TẮT)
        function enableSwipe() {
            var btn = document.getElementById('btn-swipe');
            
            if(swipeControl) {
                // Thoát Swipe
                map.removeControl(swipeControl);
                swipeControl = null;
                btn.innerHTML = '<i class="fas fa-columns"></i> Swipe Mode';
                btn.style.background = '#9b59b6';
                
                // Trả lại toàn bộ layer
                toggleAllLayers(true);
                return;
            }
            
            var keys = Object.keys(loadedLayers);
            if(keys.length < 2) { alert("Cần ít nhất 2 Layers để so sánh!"); return; }
            
            var leftLayer = loadedLayers[keys[0]].layer;
            var rightLayer = loadedLayers[keys[1]].layer;
            
            toggleAllLayers(false);
            layerGroupCollection.addLayer(leftLayer);
            layerGroupCollection.addLayer(rightLayer);
            
            swipeControl = L.control.sideBySide(leftLayer, rightLayer).addTo(map);
            
            // Đổi trạng thái UI
            btn.innerHTML = '<i class="fas fa-times"></i> Thoát Swipe';
            btn.style.background = '#e74c3c';
        }

        // Trích xuất thống kê từ dữ liệu
        function calculateStats(data, field) {
            var stats = { total_feat: 0, total_area: 0, classes: {} };
            data.features.forEach(f => {
                stats.total_feat++;
                var area = f.properties.Area_ha || 0;
                stats.total_area += area;
                
                var cVal = field ? f.properties[field] : "All";
                if (!stats.classes[cVal]) stats.classes[cVal] = { count: 0, area: 0 };
                stats.classes[cVal].count++;
                stats.classes[cVal].area += area;
            });
            return stats;
        }

        function styleFeature(feature, fldName) {
            var cVal = fldName ? feature.properties[fldName] : null;
            return { color: "#ffffff", weight: 0.5, fillColor: mapConfig.colors[cVal] || "#3388ff", fillOpacity: 0.75 };
        }

        // Dựng UI Quản lý Layer
        function buildLayerUI(name) {
            var lObj = loadedLayers[name];
            var container = document.getElementById('layer-container');
            
            var grp = document.createElement('div');
            grp.className = 'layer-group';
            
            // Tiêu đề Layer + Bật/Tắt
            grp.innerHTML = `
                <div class="layer-title">
                    <div>
                        <input type="checkbox" checked onchange="toggleSingleLayer('${name}', this.checked)" style="vertical-align:middle;">
                        <b style="cursor:pointer;" onclick="map.fitBounds(loadedLayers['${name}'].layer.getBounds())">${name}</b>
                    </div>
                    <div>
                        <span class="stat-badge" title="Total Area">${lObj.stats.total_area.toFixed(1)} ha</span>
                        <span class="stat-badge" style="background:#8e44ad;" title="Polygons">${lObj.stats.total_feat}</span>
                    </div>
                </div>
            `;
            
            // Render từng Class bên dưới Layer đó
            var cList = document.createElement('div');
            for (var c in lObj.stats.classes) {
                var cStat = lObj.stats.classes[c];
                var classDiv = document.createElement('div');
                classDiv.className = 'class-item';
                classDiv.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <input type="color" class="color-btn" value="${mapConfig.colors[c] || '#3388ff'}" onchange="changeColor('${c}', this.value)" style="margin-right:8px;">
                        <span>${c}</span>
                    </div>
                    <div>
                        <span class="stat-badge" style="background:transparent; border:1px solid #1abc9c; color:#1abc9c;">${cStat.area.toFixed(1)} ha</span>
                        <span class="stat-badge" style="background:transparent; border:1px solid #8e44ad; color:#8e44ad;">${cStat.count}</span>
                    </div>
                `;
                cList.appendChild(classDiv);
            }
            grp.appendChild(cList);
            container.appendChild(grp);
        }

        // Đổi màu thời gian thực
        function changeColor(className, hexColor) {
            mapConfig.colors[className] = hexColor;
            for (var name in loadedLayers) {
                loadedLayers[name].layer.setStyle(function(f) { return styleFeature(f, loadedLayers[name].cfg.field); });
            }
        }

        function toggleAllLayers(show) {
            var checkboxes = document.querySelectorAll('.layer-title input[type="checkbox"]');
            checkboxes.forEach(cb => { 
                cb.checked = show; 
                var name = cb.nextElementSibling.innerText;
                toggleSingleLayer(name, show);
            });
        }
    </script>
</body>
</html>
